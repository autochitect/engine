<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar ROI Calculator — @autochitect/engine</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 0 auto; padding: 2rem; color: #1f2937; }
    h1 { margin-bottom: 0.5rem; }
    .subtitle { color: #6b7280; margin-bottom: 2rem; }
    .controls { display: grid; gap: 1rem; margin-bottom: 2rem; }
    .control label { display: block; font-weight: 600; margin-bottom: 0.25rem; }
    .control input[type="range"] { width: 100%; }
    .control .value { float: right; font-weight: normal; color: #2563eb; }
    .results { background: #f8f9fa; padding: 1.5rem; border-radius: 8px; }
    .results h2 { margin-bottom: 1rem; }
    .line { display: flex; justify-content: space-between; padding: 0.35rem 0; }
    .line.indent { padding-left: 1.5rem; color: #6b7280; }
    .line.total { font-weight: bold; border-top: 2px solid #d1d5db; padding-top: 0.75rem; margin-top: 0.5rem; }
    .line.highlight { color: #16a34a; font-weight: 600; }
    #graph { margin-top: 2rem; }
    #graph h3 { margin-bottom: 0.5rem; }
    #graph pre { background: #f1f5f9; padding: 1rem; border-radius: 6px; font-size: 0.8rem; overflow-x: auto; }
    #loading { color: #6b7280; }
  </style>
</head>
<body>
  <h1>Solar ROI Calculator</h1>
  <p class="subtitle">All calculations run client-side via WebAssembly. Zero server calls.</p>

  <div id="loading">Loading engine...</div>

  <div id="app" style="display: none;">
    <div class="controls">
      <div class="control">
        <label>System size <span class="value" id="val-size">8 kW</span></label>
        <input type="range" id="size" min="1" max="30" step="0.5" value="8">
      </div>
      <div class="control">
        <label>Cost per watt <span class="value" id="val-cost">$2.80</span></label>
        <input type="range" id="cost" min="1" max="5" step="0.05" value="2.80">
      </div>
      <div class="control">
        <label>Daily peak sun hours <span class="value" id="val-sun">5.0 hrs</span></label>
        <input type="range" id="sun" min="2" max="8" step="0.5" value="5">
      </div>
      <div class="control">
        <label>Electricity rate <span class="value" id="val-rate">$0.14/kWh</span></label>
        <input type="range" id="rate" min="0.05" max="0.50" step="0.01" value="0.14">
      </div>
      <div class="control">
        <label>Federal tax credit <span class="value" id="val-credit">30%</span></label>
        <input type="range" id="credit" min="0" max="50" step="1" value="30">
      </div>
    </div>

    <div class="results" id="results"></div>

    <div id="graph">
      <h3>Dependency Graph</h3>
      <pre id="graph-output"></pre>
    </div>
  </div>

  <script type="module">
    import { createEngine } from 'https://esm.sh/@autochitect/engine';

    const model = `
      system_kw: Input
      cost_per_watt: Input
      daily_sun_hours: Input
      electricity_rate: Input
      tax_credit_pct: Input

      # Upfront costs
      gross_system_cost = system_kw * 1000 * cost_per_watt
      tax_credit = gross_system_cost * tax_credit_pct / 100
      net_system_cost = gross_system_cost - tax_credit

      # Annual production and savings
      annual_kwh = system_kw * daily_sun_hours * 365
      annual_savings = annual_kwh * electricity_rate

      # Returns
      payback_years = net_system_cost / annual_savings
      lifetime_savings = annual_savings * 25
      net_profit = lifetime_savings - net_system_cost

      # Environmental impact (EPA: 0.386 kg CO2 per kWh for US grid average)
      co2_offset_kg_per_year = annual_kwh * 0.386
      trees_equivalent = co2_offset_kg_per_year / 21
    `;

    const engine = await createEngine('https://unpkg.com/@autochitect/engine/engine.wasm');
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    const sliders = {
      size: document.getElementById('size'),
      cost: document.getElementById('cost'),
      sun: document.getElementById('sun'),
      rate: document.getElementById('rate'),
      credit: document.getElementById('credit'),
    };

    function getInputs() {
      return {
        system_kw: Number(sliders.size.value),
        cost_per_watt: Number(sliders.cost.value),
        daily_sun_hours: Number(sliders.sun.value),
        electricity_rate: Number(sliders.rate.value),
        tax_credit_pct: Number(sliders.credit.value),
      };
    }

    function fmt(n) {
      return typeof n === 'number'
        ? n.toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 })
        : '—';
    }

    function update() {
      const inputs = getInputs();

      document.getElementById('val-size').textContent = inputs.system_kw + ' kW';
      document.getElementById('val-cost').textContent = '$' + inputs.cost_per_watt.toFixed(2);
      document.getElementById('val-sun').textContent = inputs.daily_sun_hours.toFixed(1) + ' hrs';
      document.getElementById('val-rate').textContent = '$' + inputs.electricity_rate.toFixed(2) + '/kWh';
      document.getElementById('val-credit').textContent = inputs.tax_credit_pct + '%';

      const result = engine.estimate(model, inputs, { graph: true });
      const r = result.results;

      const payback = typeof r.payback_years === 'number' ? r.payback_years.toFixed(1) + ' years' : '—';
      const co2 = typeof r.co2_offset_kg_per_year === 'number'
        ? (r.co2_offset_kg_per_year / 1000).toFixed(1) + ' tonnes/yr'
        : '—';
      const trees = typeof r.trees_equivalent === 'number'
        ? Math.round(r.trees_equivalent) + ' trees/yr'
        : '—';

      document.getElementById('results').innerHTML = `
        <h2>Return on Investment</h2>
        <div class="line"><span>Gross system cost</span><span>${fmt(r.gross_system_cost)}</span></div>
        <div class="line indent"><span>Federal tax credit (${inputs.tax_credit_pct}%)</span><span>−${fmt(r.tax_credit)}</span></div>
        <div class="line"><span>Net cost after credit</span><span>${fmt(r.net_system_cost)}</span></div>
        <div class="line"><span>Annual production</span><span>${typeof r.annual_kwh === 'number' ? Math.round(r.annual_kwh).toLocaleString() : '—'} kWh</span></div>
        <div class="line"><span>Annual savings</span><span>${fmt(r.annual_savings)}</span></div>
        <div class="line total"><span>Payback period</span><span>${payback}</span></div>
        <div class="line highlight"><span>25-year net profit</span><span>${fmt(r.net_profit)}</span></div>
        <div class="line"><span>CO₂ offset</span><span>${co2}</span></div>
        <div class="line indent"><span>Equivalent trees planted</span><span>${trees}</span></div>
      `;

      if (result.graph) {
        const nodeMap = {};
        result.graph.nodes.forEach(n => { nodeMap[n.id] = n.name; });
        const lines = result.graph.edges.map(e =>
          `${nodeMap[e.source]} → ${nodeMap[e.target]}`
        );
        document.getElementById('graph-output').textContent = lines.join('\n');
      }
    }

    Object.values(sliders).forEach(s => s.addEventListener('input', update));
    update();
  </script>
</body>
</html>
