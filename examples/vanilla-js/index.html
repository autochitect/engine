<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cost Estimator — @autochitect/engine</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 0 auto; padding: 2rem; color: #1f2937; }
    h1 { margin-bottom: 0.5rem; }
    .subtitle { color: #6b7280; margin-bottom: 2rem; }
    .controls { display: grid; gap: 1rem; margin-bottom: 2rem; }
    .control label { display: block; font-weight: 600; margin-bottom: 0.25rem; }
    .control input[type="range"] { width: 100%; }
    .control .value { float: right; font-weight: normal; color: #2563eb; }
    .results { background: #f8f9fa; padding: 1.5rem; border-radius: 8px; }
    .results h2 { margin-bottom: 1rem; }
    .line { display: flex; justify-content: space-between; padding: 0.35rem 0; }
    .line.indent { padding-left: 1.5rem; color: #6b7280; }
    .line.total { font-weight: bold; border-top: 2px solid #d1d5db; padding-top: 0.75rem; margin-top: 0.5rem; }
    #graph { margin-top: 2rem; }
    #graph h3 { margin-bottom: 0.5rem; }
    #graph pre { background: #f1f5f9; padding: 1rem; border-radius: 6px; font-size: 0.8rem; overflow-x: auto; }
    #loading { color: #6b7280; }
  </style>
</head>
<body>
  <h1>SaaS Cost Estimator</h1>
  <p class="subtitle">All calculations run client-side via WebAssembly. Zero server calls.</p>

  <div id="loading">Loading engine...</div>

  <div id="app" style="display: none;">
    <div class="controls">
      <div class="control">
        <label>Employees <span class="value" id="val-employees">50</span></label>
        <input type="range" id="employees" min="1" max="500" value="50">
      </div>
      <div class="control">
        <label>Avg. salary ($) <span class="value" id="val-salary">85000</span></label>
        <input type="range" id="salary" min="30000" max="200000" step="5000" value="85000">
      </div>
      <div class="control">
        <label>Benefits rate <span class="value" id="val-benefits">30%</span></label>
        <input type="range" id="benefits" min="0" max="50" value="30">
      </div>
      <div class="control">
        <label>Office sqft/person <span class="value" id="val-sqft">150</span></label>
        <input type="range" id="sqft" min="50" max="400" step="10" value="150">
      </div>
      <div class="control">
        <label>Rent $/sqft/year <span class="value" id="val-rent">50</span></label>
        <input type="range" id="rent" min="10" max="150" step="5" value="50">
      </div>
    </div>

    <div class="results" id="results"></div>

    <div id="graph">
      <h3>Dependency Graph</h3>
      <pre id="graph-output"></pre>
    </div>
  </div>

  <script type="module">
    import { createEngine } from 'https://esm.sh/@autochitect/engine';

    const model = `
      employees: Input
      avg_salary: Input
      benefits_rate: Input
      sqft_per_person: Input
      rent_per_sqft: Input

      # People costs
      total_salaries = employees * avg_salary
      total_benefits = total_salaries * benefits_rate
      people_cost = total_salaries + total_benefits

      # Office costs
      total_sqft = employees * sqft_per_person
      office_cost = total_sqft * rent_per_sqft

      # Software & equipment
      software_per_head = 2400
      equipment_per_head = 3000
      software_cost = employees * software_per_head
      equipment_cost = employees * equipment_per_head

      # Overhead (10% of all direct costs)
      direct_costs = people_cost + office_cost + software_cost + equipment_cost
      overhead = direct_costs * 0.10

      # Total
      total_annual_cost = direct_costs + overhead
      cost_per_employee = total_annual_cost / employees
      monthly_burn = total_annual_cost / 12
    `;

    const engine = await createEngine('https://unpkg.com/@autochitect/engine/engine.wasm');
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    const sliders = {
      employees: document.getElementById('employees'),
      salary: document.getElementById('salary'),
      benefits: document.getElementById('benefits'),
      sqft: document.getElementById('sqft'),
      rent: document.getElementById('rent'),
    };

    function getInputs() {
      return {
        employees: Number(sliders.employees.value),
        avg_salary: Number(sliders.salary.value),
        benefits_rate: Number(sliders.benefits.value) / 100,
        sqft_per_person: Number(sliders.sqft.value),
        rent_per_sqft: Number(sliders.rent.value),
      };
    }

    function fmt(n) {
      return typeof n === 'number'
        ? n.toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 })
        : '—';
    }

    function update() {
      const inputs = getInputs();

      // Update slider labels
      document.getElementById('val-employees').textContent = inputs.employees;
      document.getElementById('val-salary').textContent = fmt(inputs.avg_salary);
      document.getElementById('val-benefits').textContent = (inputs.benefits_rate * 100).toFixed(0) + '%';
      document.getElementById('val-sqft').textContent = inputs.sqft_per_person;
      document.getElementById('val-rent').textContent = fmt(inputs.rent_per_sqft);

      const result = engine.estimate(model, inputs, { graph: true });
      const r = result.results;

      document.getElementById('results').innerHTML = `
        <h2>Annual Cost Breakdown</h2>
        <div class="line"><span>Total salaries</span><span>${fmt(r.total_salaries)}</span></div>
        <div class="line indent"><span>Benefits</span><span>${fmt(r.total_benefits)}</span></div>
        <div class="line"><span>People cost</span><span>${fmt(r.people_cost)}</span></div>
        <div class="line"><span>Office cost (${Number(r.total_sqft).toLocaleString()} sqft)</span><span>${fmt(r.office_cost)}</span></div>
        <div class="line"><span>Software</span><span>${fmt(r.software_cost)}</span></div>
        <div class="line"><span>Equipment</span><span>${fmt(r.equipment_cost)}</span></div>
        <div class="line"><span>Overhead (10%)</span><span>${fmt(r.overhead)}</span></div>
        <div class="line total"><span>Total annual cost</span><span>${fmt(r.total_annual_cost)}</span></div>
        <div class="line"><span>Per employee</span><span>${fmt(r.cost_per_employee)}</span></div>
        <div class="line"><span>Monthly burn</span><span>${fmt(r.monthly_burn)}</span></div>
      `;

      // Show dependency graph
      if (result.graph) {
        const nodeMap = {};
        result.graph.nodes.forEach(n => { nodeMap[n.id] = n.name; });
        const lines = result.graph.edges.map(e =>
          `${nodeMap[e.source]} → ${nodeMap[e.target]}`
        );
        document.getElementById('graph-output').textContent = lines.join('\n');
      }
    }

    Object.values(sliders).forEach(s => s.addEventListener('input', update));
    update();
  </script>
</body>
</html>
